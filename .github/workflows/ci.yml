name: CI — ML Fraud Detector

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, Test & Validate Model
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn>=1.5 fastapi uvicorn[standard] pydantic>=2.0 httpx joblib pytest pytest-asyncio

      - name: Run linter (ruff)
        run: |
          pip install ruff
          ruff check app/ tests/ --ignore E501
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: aidenai-ml-fraud-detector:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
