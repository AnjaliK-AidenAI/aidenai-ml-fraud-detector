version: "3.9"
services:
  fraud-detector:
    build: .
    ports:
      - "8091:8000"
    volumes:
      - models:/app/models
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD","python","-c","import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  models: